<div class="card">

  <div class="todo-header">

    <h2>To Do</h2>

    <button class="add-task-btn"
            (click)="openAddTask()">

      <i class="fa-solid fa-plus"></i>

      Add Task

    </button>

  </div>

  <div class="task-list">

    @for(task of taskService.tasks(); track task.id){

    <app-todo-card [task]="task">
    </app-todo-card>

    }

  </div>

</div>
