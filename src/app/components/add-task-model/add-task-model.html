<div class="overlay" (click)="goBack()">

  <div class="modal"
       (click)="$event.stopPropagation()">

    <div class="modal-header">

      <h2>

        {{ mode() === 'add' ? 'Add New Task' : 'Edit Task' }}
      
      </h2>

      <button class="back-btn"
              type="button"
              (click)="goBack()">

        Go Back

      </button>

    </div>

    <form>

      <!-- Title -->

      <div class="form-group">

        <label>Title</label>

        <input type="text"
               [value]="title()"
               placeholder="Enter task title"
               (input)="title.set(txtTitle.value)"
               #txtTitle
               >

      </div>

      <!-- Date -->

      <div class="form-group">

        <label>Date</label>

        <input type="date">

      </div>

      <!-- Priority -->

      <div class="form-group">

        <label>Priority</label>

        <div class="priority-group">

          <label>

            <input type="radio"
                   [value]="'High'"
                   [checked]="priority() === 'High'"
                   (change)="priority.set('High')"
                   High />
            High

          </label>

          <label>

            <input type="radio"
                   [value]="'Medium'"
                   [checked]="priority() === 'Medium'"
                   (change)="priority.set('Medium')"
                   />
            Medium
          </label>

          <label>

           

            <input type="radio"
                   [value]="'Low'"
                   [checked]="priority() === 'Low'"
                   (change)="priority.set('Low')" />

            Low

          </label>

        </div>

      </div>

      <!-- Bottom Grid -->

      <div class="bottom-grid">

        <!-- Description -->

        <div class="form-group">

          <label>Task Description</label>

          <textarea #txtDescription
                    (input)="description.set(txtDescription.value)"
                    placeholder="Start writing here...">
            {{ description() }}
            </textarea>

        </div>

        <!-- Upload -->

        <div class="upload-box">

          <i class="fa-regular fa-image upload-icon"></i>

          <p>Drag & Drop Files Here</p>

          <span>or</span>

          <button type="button">

            Browse

          </button>

        </div>

      </div>

      <button class="done-btn"
              type="button" (click)="saveTask()">

        {{ mode() === 'add' ? 'Create Task' : 'Update Task' }}


      </button>

    </form>
    </div>
  </div>
